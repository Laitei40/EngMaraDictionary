<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="English ⇄ Mara Dictionary — fast, offline-capable word lookup for the Mara (Lakher) language">
  <meta name="theme-color" content="#ffffff">
  <title>English ⇄ Mara Dictionary</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Top Navigation ── -->
  <nav class="topnav" role="navigation">
    <div class="container topnav-inner">
      <a href="/" class="topnav-brand">
        <svg class="topnav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
          <path d="M8 7h6"/><path d="M8 11h8"/>
        </svg>
        <span class="topnav-name">MaraDict</span>
      </a>
      <div class="topnav-links">
        <a href="/" class="topnav-link active">Home</a>
        <a href="/about.html" class="topnav-link">About</a>
        <a href="https://github.com/Laitei40/EngMaraDictionary" class="topnav-link" target="_blank" rel="noopener">GitHub</a>
      </div>
      <div id="offline-badge" class="offline-badge hidden" role="status" aria-live="polite">
        <span class="offline-dot"></span>Offline
      </div>
    </div>
  </nav>

  <!-- ── Search Header ── -->
  <header class="search-header">
    <div class="container">
      <div class="lang-indicator" id="lang-indicator">
        <span class="lang-indicator-label" id="lang-label">English — Mara</span>
      </div>

      <form id="search-form" class="search-form" role="search" autocomplete="off">
        <div class="search-bar-wrap">
          <div class="search-bar">
            <input
              id="search-input"
              type="search"
              class="search-input"
              placeholder="Search a word…"
              aria-label="Search for a word"
              aria-autocomplete="list"
              aria-controls="suggestions-list"
              spellcheck="false"
              autofocus
            >
            <button type="submit" class="search-btn" aria-label="Search">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
            </button>
          </div>
          <!-- Autocomplete Dropdown -->
          <ul id="suggestions-list" class="suggestions-list hidden" role="listbox"></ul>
        </div>
        <div class="search-meta-row">
          <div class="lang-toggle" role="radiogroup" aria-label="Search direction">
            <button type="button" class="lang-btn active" data-lang="en" aria-pressed="true">
              English → Mara
            </button>
            <button type="button" class="lang-btn" data-lang="mrh" aria-pressed="false">
              Mara → English
            </button>
          </div>
          <span class="kbd-hint" title="Press / to focus search"><kbd>/</kbd> to search</span>
        </div>
      </form>
    </div>
  </header>

  <!-- ── Main Content ── -->
  <main class="main">
    <div class="container">

      <div id="status-message" class="alert hidden"></div>
      <div id="results-count" class="results-meta hidden"></div>
      <div id="results-container" class="results-area"></div>

      <!-- Alphabet Browser -->
      <section id="alphabet-browser" class="alphabet-section">
        <h3 class="section-label">Browse by Letter</h3>
        <div class="alphabet-bar" id="alphabet-bar" role="navigation" aria-label="Browse alphabetically"></div>
        <div id="browse-results" class="browse-results hidden"></div>
      </section>

      <!-- Recent Searches -->
      <section id="recent-section" class="recent-section hidden" aria-label="Recent searches">
        <h3 class="recent-title">Recent</h3>
        <ul id="recent-list" class="recent-list"></ul>
      </section>

    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-copy">&copy; 2026 MaraDict</p>
      <div class="footer-links">
        <a href="/about.html">About</a>
        <span class="footer-dot">&middot;</span>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSceWwVrtH5KivCR3wuvKqMn8U238-aCxOJIIWs1gK4pt994oA/viewform" target="_blank" rel="noopener">Suggest a Word</a>
        <span class="footer-dot">&middot;</span>
        <a href="https://github.com/Laitei40/EngMaraDictionary" target="_blank" rel="noopener">GitHub</a>
      </div>
    </div>
  </footer>

  <!-- ── Cookie Consent Banner ── -->
  <div id="cookie-banner" class="cookie-banner hidden">
    <div class="cookie-inner">
      <p>MaraDict uses cookies &amp; local storage to cache searches and remember your preferences.</p>
      <button id="cookie-accept" class="cookie-accept">OK</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
